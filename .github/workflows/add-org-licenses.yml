name: Add BSD-2-Clause-Patent License to Org Repos

on:
  workflow_dispatch:
    inputs:
      repos:
        description: >
          Space-separated list of org repos to add the license to
          (e.g. "m-store m-ipc monadic-hypervisor .github")
        required: true
        default: "m-store m-ipc monadic-hypervisor .github"
      dry_run:
        description: "Dry run (print actions without making changes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  add-licenses:
    runs-on: ubuntu-latest
    env:
      ORG: SiliconLanguage
      BRANCH: chore/add-bsd-2-clause-patent-license
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ORG_LICENSES_PAT secret exists
        run: |
          if [ -z "${{ secrets.ORG_LICENSES_PAT }}" ]; then
            echo "::error::Secret ORG_LICENSES_PAT is not set."
            echo "Create a GitHub PAT with 'repo' scope for all target repos"
            echo "and save it as a repository secret named ORG_LICENSES_PAT."
            exit 1
          fi

      - name: Configure gh CLI with PAT
        run: echo "${{ secrets.ORG_LICENSES_PAT }}" | gh auth login --with-token

      - name: Write BSD-2-Clause-Patent LICENSE
        run: |
          cat > /tmp/LICENSE << 'ENDOFLICENSE'
          Copyright (c) 2026 SiliconLanguage

          Redistribution and use in source and binary forms, with or without modification, are permitted provided that the following conditions are met:

          1. Redistributions of source code must retain the above copyright notice, this list of conditions and the following disclaimer.

          2. Redistributions in binary form must reproduce the above copyright notice, this list of conditions and the following disclaimer in the documentation and/or other materials provided with the distribution.

          Subject to the terms and conditions of this license, each copyright holder and contributor hereby grants to those receiving rights under this license a perpetual, worldwide, non-exclusive, no-charge, royalty-free, irrevocable (except for failure to satisfy the conditions of this license) patent license to make, have made, use, offer to sell, sell, import, and otherwise transfer this software, where such license applies only to those patent claims, already acquired or hereafter acquired, licensable by such copyright holder or contributor that are necessarily infringed by:

          (a) their Contribution(s) (the licensed copyrights of copyright holders and non-copyrightable additions of contributors, in source or binary form) alone; or

          (b) combination of their Contribution(s) with the work of authorship to which such Contribution(s) was added by such copyright holder or contributor, if, at the time the Contribution is added, such addition causes such combination to be necessarily infringed. The patent license shall not apply to any other combinations which include the Contribution.

          Except as expressly stated above, no rights or licenses from any copyright holder or contributor is granted under this license, whether expressly, by implication, estoppel or otherwise.

          DISCLAIMER

          THIS SOFTWARE IS PROVIDED BY THE COPYRIGHT HOLDERS AND CONTRIBUTORS "AS IS" AND ANY EXPRESS OR IMPLIED WARRANTIES, INCLUDING, BUT NOT LIMITED TO, THE IMPLIED WARRANTIES OF MERCHANTABILITY AND FITNESS FOR A PARTICULAR PURPOSE ARE DISCLAIMED. IN NO EVENT SHALL THE COPYRIGHT HOLDERS OR CONTRIBUTORS BE LIABLE FOR ANY DIRECT, INDIRECT, INCIDENTAL, SPECIAL, EXEMPLARY, OR CONSEQUENTIAL DAMAGES (INCLUDING, BUT NOT LIMITED TO, PROCUREMENT OF SUBSTITUTE GOODS OR SERVICES; LOSS OF USE, DATA, OR PROFITS; OR BUSINESS INTERRUPTION) HOWEVER CAUSED AND ON ANY THEORY OF LIABILITY, WHETHER IN CONTRACT, STRICT LIABILITY, OR TORT (INCLUDING NEGLIGENCE OR OTHERWISE) ARISING IN ANY WAY OUT OF THE USE OF THIS SOFTWARE, EVEN IF ADVISED OF THE POSSIBILITY OF SUCH DAMAGE.
          ENDOFLICENSE
          # Strip the leading indentation added by the heredoc above
          sed -i 's/^          //' /tmp/LICENSE
          echo "LICENSE written ($(wc -c < /tmp/LICENSE) bytes)"

      - name: Add license to each target repo
        run: |
          set -euo pipefail

          for REPO in ${{ inputs.repos }}; do
            FULL_REPO="${ORG}/${REPO}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Processing: ${FULL_REPO}"

            # Check if LICENSE already exists and matches
            EXISTING=$(gh api "repos/${FULL_REPO}/contents/LICENSE" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || true)
            if [ -n "$EXISTING" ] && diff -q <(echo "$EXISTING") /tmp/LICENSE > /dev/null 2>&1; then
              echo "  ✓ LICENSE already matches — skipping ${FULL_REPO}"
              continue
            fi

            # Get default branch
            DEFAULT_BRANCH=$(gh api "repos/${FULL_REPO}" --jq '.default_branch')
            echo "  Default branch: ${DEFAULT_BRANCH}"

            # Check if branch already exists
            BRANCH_EXISTS=$(gh api "repos/${FULL_REPO}/git/refs/heads/${BRANCH}" \
              --jq '.ref' 2>/dev/null || true)

            if [ "${DRY_RUN}" = "true" ]; then
              echo "  [DRY RUN] Would create branch '${BRANCH}' and open PR in ${FULL_REPO}"
              continue
            fi

            # Clone, branch, commit, push
            TMPDIR=$(mktemp -d)
            gh repo clone "${FULL_REPO}" "${TMPDIR}" -- --depth=1 --branch "${DEFAULT_BRANCH}"
            cd "${TMPDIR}"

            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"

            if [ -n "${BRANCH_EXISTS}" ]; then
              echo "  Branch ${BRANCH} already exists — checking out"
              git fetch origin "${BRANCH}"
              git checkout "${BRANCH}"
            else
              git checkout -b "${BRANCH}"
            fi

            cp /tmp/LICENSE LICENSE
            git add LICENSE

            if git diff --cached --quiet; then
              echo "  ✓ No changes needed in ${FULL_REPO}"
              cd /
              rm -rf "${TMPDIR}"
              continue
            fi

            git commit -m "chore: add BSD-2-Clause-Patent license"
            git push origin "${BRANCH}"

            # Open PR if one doesn't exist yet
            PR_URL=$(gh pr list --repo "${FULL_REPO}" \
              --head "${BRANCH}" --json url --jq '.[0].url' 2>/dev/null || true)

            if [ -z "${PR_URL}" ]; then
              PR_URL=$(gh pr create \
                --repo "${FULL_REPO}" \
                --base "${DEFAULT_BRANCH}" \
                --head "${BRANCH}" \
                --title "chore: add BSD-2-Clause-Patent license" \
                --body "Adds the [BSD-2-Clause-Patent](https://opensource.org/license/bsdpluspatent) license to align with the rest of the SiliconLanguage org (see [tensorplane](https://github.com/SiliconLanguage/tensorplane?tab=BSD-2-Clause-Patent-1-ov-file)).")
              echo "  ✅ PR opened: ${PR_URL}"
            else
              echo "  ✅ PR already open: ${PR_URL}"
            fi

            cd /
            rm -rf "${TMPDIR}"
          done
